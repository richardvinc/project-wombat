map $http_x_user_id $limit_key {
    default $http_x_user_id;
    "" $binary_remote_addr;
}

limit_req_zone $limit_key zone=buy_per_user:10m rate=${LOADTEST_NGINX_RATE_LIMIT};
limit_conn_zone $limit_key zone=conn_per_user:10m;

log_format loadtest_json escape=json
    '{'
    '"time":"$time_iso8601",'
    '"request_id":"$request_id",'
    '"remote_addr":"$remote_addr",'
    '"client_id":"$http_x_user_id",'
    '"method":"$request_method",'
    '"uri":"$uri",'
    '"query":"$args",'
    '"status":$status,'
    '"upstream_status":"$upstream_status",'
    '"request_time":$request_time,'
    '"upstream_response_time":"$upstream_response_time",'
    '"body_bytes_sent":$body_bytes_sent,'
    '"http_referer":"$http_referer",'
    '"http_user_agent":"$http_user_agent"'
    '}';

upstream api_backend {
    server api:3100;
    keepalive 64;
}

server {
    listen 8080;
    server_name localhost;

    access_log /var/log/nginx/access.log loadtest_json;
    error_log /var/log/nginx/error.log warn;

    limit_req_status 429;
    limit_conn_status 429;

    location = /healthz {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    location /api/orders/buy {
        limit_req zone=buy_per_user burst=${LOADTEST_NGINX_RATE_BURST} nodelay;
        limit_conn conn_per_user ${LOADTEST_NGINX_CONN_LIMIT};

        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;
    }

    location /api/orders/pay {
        limit_req zone=buy_per_user burst=${LOADTEST_NGINX_RATE_BURST} nodelay;
        limit_conn conn_per_user ${LOADTEST_NGINX_CONN_LIMIT};

        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;
    }

    location /api/ {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;
    }
}
